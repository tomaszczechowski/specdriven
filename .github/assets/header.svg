<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" role="img" aria-label="specdriven.sh — Spec Driven Development">
  <defs>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#1f1f1f" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="0%" r="70%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="320" fill="#0a0a0a"/>
  <rect width="1200" height="320" fill="url(#grid)" opacity="0.55"/>
  <rect width="1200" height="320" fill="url(#glow)"/>

  <text x="600" y="85"
        font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Monaco, Consolas, monospace"
        font-size="13"
        letter-spacing="6"
        fill="#666"
        text-anchor="middle">
    SDD · SPEC DRIVEN DEVELOPMENT
  </text>

  <text x="600" y="190"
        font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Monaco, Consolas, monospace"
        font-size="72"
        font-weight="700"
        text-anchor="middle"
        fill="url(#brand)">
    <tspan fill="#22d3ee">$</tspan> specdriven.sh
  </text>

  <text x="600" y="240"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="18"
        fill="#a3a3a3"
        text-anchor="middle">
    Production project blueprints — with AI built in.
  </text>

  <line x1="540" y1="275" x2="660" y2="275" stroke="url(#brand)" stroke-width="2" opacity="0.7"/>
</svg>
